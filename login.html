<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Swati Enterprises</title>
<meta name="description" content="Login to your Swati Enterprises account to manage orders, prescriptions, and saved medicines.">
<meta name="theme-color" content="#0F9D58">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/utilities.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="auth">
<a href="#main" class="skip-link">Skip to content</a>

<main id="main" class="auth-layout">
  <div class="auth-sidebar">
    <a href="index.html" class="auth-brand">
      <svg class="logo-mark" width="48" height="48" viewBox="0 0 64 64"><defs><linearGradient id="logoGradA" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0F9D58"/><stop offset="100%" stop-color="#1976D2"/></linearGradient></defs><circle cx="32" cy="32" r="29" fill="none" stroke="url(#logoGradA)" stroke-width="2.4" stroke-dasharray="4 6"/><circle cx="32" cy="32" r="23" fill="url(#logoGradA)"/><path d="M24 32 h16 M32 24 v16" stroke="#fff" stroke-width="4.4" stroke-linecap="round"/><path d="M20 40 q3 -8 8 -3" stroke="#fff" stroke-width="2.6" stroke-linecap="round" fill="none" opacity=".85"/></svg>
      <span>Swati Enterprises</span>
    </a>
    <div class="auth-sidebar-content">
      <h2>Welcome Back!</h2>
      <p>Log in to access your saved medicines, manage prescriptions, and track your active orders in real-time.</p>
    </div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form-inner">
      <h2 style="font-size:2rem;margin-bottom:8px;">Sign In</h2>
      <p style="color:var(--slate-2);margin-bottom:32px;">Don't have an account? <a href="register.html" style="color:var(--primary);font-weight:600;">Create one here.</a></p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" class="form-control" id="loginEmail" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <div style="display:flex;justify-content:space-between;">
            <label for="loginPassword">Password</label>
            <a href="#" style="font-size:.85rem;color:var(--primary);">Forgot Password?</a>
          </div>
          <div class="input-with-icon">
            <input type="password" class="form-control" id="loginPassword" required placeholder="••••••••">
            <button type="button" class="pw-toggle" id="loginPwToggle" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:.9rem;">
          <input type="checkbox"> Remember me for 30 days
        </label>
        
        <button type="submit" class="btn btn-primary btn-block btn-lg">Log In</button>
      </form>
    </div>
  </div>
</main>

<div class="toast-stack" id="toastStack"></div>
<script src="js/validation.js"></script>
<script src="js/app.js"></script>
</body>
</html>
